services:
  backend:
    build: ./ad-backend
    ports: ["3000:3000"]
    env_file:
      - .env 
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      NODE_ENV: ${NODE_ENV}

  frontend:
    build: ./ad-frontend
    ports: ["3001:3000"]
    env_file:
      - .env 
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb:/data/db

volumes:
  mongodb:
